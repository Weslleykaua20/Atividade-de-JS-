<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios de JavaScript - TI Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Lista de Exercícios - JavaScript</h1>
        <p>Professor: Maurício Júnior | Aluno: Weslley Kauã</p>
        <hr>

        <div class="card">
            <h3>1) Maior e Menor Valor</h3>
            <input type="number" id="ex1_a" placeholder="Valor A">
            <input type="number" id="ex1_b" placeholder="Valor B">
            <input type="number" id="ex1_c" placeholder="Valor C">
            <input type="number" id="ex1_d" placeholder="Valor D">
            <input type="number" id="ex1_e" placeholder="Valor E">
            <button onclick="dispararEx1()">Verificar</button>
            <div class="resultado" id="res_ex1"></div>
        </div>

        <div class="card">
            <h3>2) Verificar Vogal</h3>
            <input type="text" id="ex2_c" maxlength="1" placeholder="Digite um caractere">
            <button onclick="dispararEx2()">Verificar</button>
            <div class="resultado" id="res_ex2"></div>
        </div>

        <div class="card">
            <h3>3) Limites (Pares e Somatório)</h3>
            <input type="number" id="ex3_li" placeholder="Limite Inferior">
            <input type="number" id="ex3_ls" placeholder="Limite Superior">
            <button onclick="dispararEx3()">Calcular</button>
            <div class="resultado" id="res_ex3"></div>
        </div>

        <div class="card">
            <h3>4) Ordem Crescente</h3>
            <input type="number" id="ex4_a" placeholder="Valor A">
            <input type="number" id="ex4_b" placeholder="Valor B">
            <input type="number" id="ex4_c" placeholder="Valor C">
            <button onclick="dispararEx4()">Ordenar</button>
            <div class="resultado" id="res_ex4"></div>
        </div>

        <div class="card">
            <h3>5) Positivo ou Negativo</h3>
            <input type="number" id="ex5_x" placeholder="Digite um valor">
            <button onclick="dispararEx5()">Verificar</button>
            <div class="resultado" id="res_ex5"></div>
        </div>

        <div class="card">
            <h3>6) Par ou Ímpar</h3>
            <input type="number" id="ex6_x" placeholder="Digite um valor">
            <button onclick="dispararEx6()">Verificar</button>
            <div class="resultado" id="res_ex6"></div>
        </div>
    </div>

    <script src="jsdaativ.js"></script>
</body>
</html>
